<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — PrismStatic.web</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23141218'/><text x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='900' font-size='20' fill='%237c3aed'>P</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f5f8;--card:#fff;--ink:#141218;--mut:#545061;--faint:#757082;
  --line:#e9e6f0;--line2:#d6d1e2;--acc:#6d28d9;--accs:#7c3aed;--tint:#f1edfa;
  --ease:cubic-bezier(0.16,1,0.3,1);
  --sh:0 2px 6px rgba(24,16,50,0.04),0 16px 40px rgba(24,16,50,0.07);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
a{text-decoration:none;color:inherit;}
button,input,textarea{font-family:inherit;}
h1,h2,h3{font-family:'Bricolage Grotesque',system-ui,sans-serif;}
::selection{background:#ddd0f7;}

/* LOGIN */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.gcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:48px 44px;width:100%;max-width:400px;box-shadow:var(--sh);animation:up 0.6s var(--ease);}
@keyframes up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.glogo{font-family:'Bricolage Grotesque';font-size:1.2rem;font-weight:800;margin-bottom:6px;}
.glogo span{color:var(--acc);}
.gsub{font-size:0.85rem;color:var(--mut);margin-bottom:32px;}
.gf{margin-bottom:16px;}
.gf label{display:block;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;}
.gf input{width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.gf input:focus{border-color:var(--acc);box-shadow:0 0 0 4px rgba(124,58,237,0.1);}
.gbtn{width:100%;margin-top:8px;background:var(--ink);color:#fff;border:none;border-radius:100px;padding:15px;font-size:0.92rem;font-weight:700;cursor:pointer;transition:background 0.25s;}
.gbtn:hover{background:var(--acc);}
.gerr{font-size:0.8rem;color:#dc2626;margin-top:14px;text-align:center;min-height:1.2em;}
.gshake{animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* DASH */
.dash{display:none;max-width:1000px;margin:0 auto;padding:40px 24px 100px;}
.dash.on{display:block;}
.dhead{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:36px;}
.dhead h1{font-size:1.7rem;font-weight:800;letter-spacing:-0.02em;}
.dhead .sub{font-size:0.85rem;color:var(--mut);margin-top:4px;}
.dactions{display:flex;gap:10px;}
.dbtn{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--line);border-radius:100px;padding:10px 20px;font-size:0.82rem;font-weight:600;color:var(--mut);cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.dbtn:hover{border-color:var(--line2);color:var(--ink);}
.dbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* IMPORT */
.imp{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:28px;}
.imp h3{font-size:0.95rem;font-weight:700;margin-bottom:6px;font-family:'Inter';}
.imp p{font-size:0.8rem;color:var(--mut);margin-bottom:14px;line-height:1.6;}
.imp-row{display:flex;gap:10px;}
.imp-row input{flex:1;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:12px 15px;font-size:0.82rem;font-family:'JetBrains Mono',monospace;color:var(--ink);outline:none;transition:border-color 0.2s;}
.imp-row input:focus{border-color:var(--acc);}
.imp-row button{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-size:0.82rem;font-weight:700;cursor:pointer;transition:background 0.25s;white-space:nowrap;}
.imp-row button:hover{background:var(--acc);}
.imp-msg{font-size:0.78rem;margin-top:10px;min-height:1.2em;}
.imp-msg.ok{color:#16a34a;}
.imp-msg.err{color:#dc2626;}

/* BOOKINGS */
.empty{text-align:center;padding:70px 24px;background:var(--card);border:1px dashed var(--line2);border-radius:18px;}
.empty h3{font-size:1.1rem;margin-bottom:8px;}
.empty p{font-size:0.85rem;color:var(--mut);max-width:400px;margin:0 auto;line-height:1.7;}
.blist{display:flex;flex-direction:column;gap:16px;}
.bk{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:box-shadow 0.3s,border-color 0.3s;animation:up 0.5s var(--ease);}
.bk:hover{box-shadow:var(--sh);border-color:var(--line2);}
.bk-top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 26px;cursor:pointer;flex-wrap:wrap;}
.bk-who{display:flex;align-items:center;gap:16px;}
.bk-av{width:44px;height:44px;border-radius:50%;background:var(--tint);color:var(--acc);font-weight:800;font-size:0.95rem;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque';flex-shrink:0;}
.bk-name{font-size:0.98rem;font-weight:700;}
.bk-meta{font-size:0.78rem;color:var(--faint);margin-top:2px;}
.bk-right{display:flex;align-items:center;gap:12px;}
.bk-date{font-size:0.78rem;font-weight:700;color:var(--acc);background:var(--tint);padding:8px 15px;border-radius:100px;white-space:nowrap;}
.bk-x{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;transition:transform 0.35s var(--ease);flex-shrink:0;}
.bk.open .bk-x{transform:rotate(180deg);}
.bk-x svg{width:13px;height:13px;stroke:var(--mut);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.bk-body{max-height:0;overflow:hidden;transition:max-height 0.55s var(--ease);}
.bk.open .bk-body{max-height:1400px;}
.bk-in{padding:0 26px 26px;border-top:1px solid var(--line);}
.bk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;padding:20px 0;}
.bk-f .k{font-size:0.68rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);margin-bottom:4px;}
.bk-f .v{font-size:0.87rem;font-weight:600;line-height:1.5;}
.bk-f .v a{color:var(--acc);}
.bk-f .v a:hover{text-decoration:underline;}
.prompt-h{display:flex;align-items:center;justify-content:space-between;margin:6px 0 10px;}
.prompt-h span{font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);}
.copy{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:#fff;border:none;border-radius:100px;padding:8px 16px;font-size:0.75rem;font-weight:700;cursor:pointer;transition:background 0.25s;}
.copy:hover{background:var(--acc);}
.copy svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.prompt{background:#17141d;color:#e6e1f2;border-radius:14px;padding:22px;font-family:'JetBrains Mono',monospace;font-size:0.76rem;line-height:1.75;white-space:pre-wrap;word-break:break-word;max-height:340px;overflow:auto;}
.prompt .hl{color:#c4b5fd;font-weight:500;}
.bk-foot{display:flex;justify-content:flex-end;margin-top:16px;}
.del{background:none;border:none;font-size:0.76rem;font-weight:600;color:#dc2626;cursor:pointer;padding:6px 10px;border-radius:8px;transition:background 0.2s;}
.del:hover{background:#fef2f2;}
.sect-l{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);margin:34px 0 14px;}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="gate" id="gate">
  <form class="gcard" id="gform">
    <div class="glogo">PrismStatic<span>.web</span></div>
    <div class="gsub">Admin control panel — sign in to continue.</div>
    <div class="gf">
      <label for="ge">Admin email</label>
      <input type="email" id="ge" autocomplete="username" required>
    </div>
    <div class="gf">
      <label for="gp">Password</label>
      <input type="password" id="gp" autocomplete="current-password" required>
    </div>
    <button class="gbtn" type="submit">Sign in</button>
    <div class="gerr" id="gerr"></div>
  </form>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="dhead">
    <div>
      <h1>Bookings</h1>
      <div class="sub" id="dcount"></div>
    </div>
    <div class="dactions">
      <a href="index.html" class="dbtn"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>View site</a>
      <button class="dbtn" id="logout"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log out</button>
    </div>
  </div>

  <div class="imp">
    <h3>Import a booking</h3>
    <p>Bookings made on this device appear automatically. For bookings from other devices, paste the <strong>booking_code</strong> from the notification email you received.</p>
    <div class="imp-row">
      <input type="text" id="impIn" placeholder="Paste booking code here...">
      <button id="impBtn">Import</button>
    </div>
    <div class="imp-msg" id="impMsg"></div>
  </div>

  <div id="content"></div>
</div>

<script>
/* ===== AUTH ===== */
const ADMIN_EMAIL='veldanleeyh@gmail.com';
const PASS_HASH='88c7c3491e0dbbb7b066f30c509857132152d87c9bfdabf3dc58c4d5cd3c3b3f';
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}

const gate=document.getElementById('gate'),dash=document.getElementById('dash');
function showDash(){gate.style.display='none';dash.classList.add('on');render();}
if(sessionStorage.getItem('ps_admin')==='1')showDash();

document.getElementById('gform').addEventListener('submit',async e=>{
  e.preventDefault();
  const email=document.getElementById('ge').value.trim().toLowerCase();
  const pass=document.getElementById('gp').value;
  const err=document.getElementById('gerr'),card=e.target;
  if(email===ADMIN_EMAIL&&await sha256(pass)===PASS_HASH){
    sessionStorage.setItem('ps_admin','1');showDash();
  }else{
    err.textContent='Wrong email or password.';
    card.classList.remove('gshake');void card.offsetWidth;card.classList.add('gshake');
    document.getElementById('gp').value='';
  }
});
document.getElementById('logout').addEventListener('click',()=>{sessionStorage.removeItem('ps_admin');location.reload();});

/* ===== DATA ===== */
function load(){try{return JSON.parse(localStorage.getItem('ps_bookings')||'[]');}catch(_){return [];}}
function save(b){localStorage.setItem('ps_bookings',JSON.stringify(b));}
function fmt(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-SG',{weekday:'short',day:'numeric',month:'short',year:'numeric'}):'—';}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function initials(n){return n.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();}

/* ===== RENDER ===== */
function render(){
  const all=load().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const today=new Date();today.setHours(0,0,0,0);
  const up=all.filter(b=>new Date(b.date+'T00:00:00')>=today);
  const past=all.filter(b=>new Date(b.date+'T00:00:00')<today);
  document.getElementById('dcount').textContent=up.length+' upcoming · '+past.length+' past';
  const c=document.getElementById('content');
  if(!all.length){
    c.innerHTML='<div class="empty"><h3>No bookings yet</h3><p>When a client completes the project form, their booking appears here — or import one with the code from your notification email above.</p></div>';
    return;
  }
  let html='';
  if(up.length){html+='<div class="sect-l">Upcoming</div><div class="blist">'+up.map(card).join('')+'</div>';}
  if(past.length){html+='<div class="sect-l">Past</div><div class="blist">'+past.map(card).join('')+'</div>';}
  c.innerHTML=html;
  bind();
}

function card(b){
  const prompt=esc(b.prompt||'').replace(/\[ADD YOUR OWN PROMPT IN HERE[^\]]*\]/,m=>'<span class="hl">'+m+'</span>');
  return `<div class="bk" data-ref="${esc(b.ref)}">
    <div class="bk-top" data-toggle>
      <div class="bk-who">
        <div class="bk-av">${esc(initials(b.name||'?'))}</div>
        <div>
          <div class="bk-name">${esc(b.name)}</div>
          <div class="bk-meta">${esc(b.type)} · ${esc(b.style)} · Ref ${esc(b.ref)}</div>
        </div>
      </div>
      <div class="bk-right">
        <span class="bk-date">${fmt(b.date)}</span>
        <span class="bk-x"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>
      </div>
    </div>
    <div class="bk-body"><div class="bk-in">
      <div class="bk-grid">
        <div class="bk-f"><div class="k">Email</div><div class="v"><a href="mailto:${esc(b.email)}">${esc(b.email)}</a></div></div>
        <div class="bk-f"><div class="k">Phone</div><div class="v"><a href="tel:${esc(b.phone)}">${esc(b.phone)}</a></div></div>
        <div class="bk-f"><div class="k">Features</div><div class="v">${esc((b.features||[]).join(', ')||'None')}</div></div>
        <div class="bk-f"><div class="k">Client notes</div><div class="v">${esc(b.notes||'None')}</div></div>
      </div>
      <div class="prompt-h">
        <span>Claude Code prompt</span>
        <button class="copy" data-copy><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy prompt</button>
      </div>
      <div class="prompt" data-prompt>${prompt}</div>
      <div class="bk-foot"><button class="del" data-del>Delete booking</button></div>
    </div></div>
  </div>`;
}

function bind(){
  document.querySelectorAll('[data-toggle]').forEach(t=>t.addEventListener('click',()=>t.closest('.bk').classList.toggle('open')));
  document.querySelectorAll('[data-copy]').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const txt=btn.closest('.bk-in').querySelector('[data-prompt]').innerText;
    navigator.clipboard.writeText(txt).then(()=>{
      btn.innerHTML='<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;"><polyline points="20 6 9 17 4 12"/></svg>Copied';
      setTimeout(()=>btn.innerHTML='<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy prompt',1800);
    });
  }));
  document.querySelectorAll('[data-del]').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const ref=btn.closest('.bk').dataset.ref;
    if(confirm('Delete booking '+ref+'? This cannot be undone.')){
      save(load().filter(b=>b.ref!==ref));render();
    }
  }));
}

/* ===== IMPORT ===== */
document.getElementById('impBtn').addEventListener('click',()=>{
  const inp=document.getElementById('impIn'),msg=document.getElementById('impMsg');
  const code=inp.value.trim();
  msg.className='imp-msg';
  if(!code){msg.textContent='Paste a code first.';msg.classList.add('err');return;}
  try{
    const b=JSON.parse(decodeURIComponent(escape(atob(code))));
    if(!b.ref||!b.name||!b.date)throw new Error('bad');
    const all=load();
    if(all.some(x=>x.ref===b.ref)){msg.textContent='Booking '+b.ref+' is already in the list.';msg.classList.add('err');return;}
    all.push(b);save(all);
    inp.value='';msg.textContent='Imported booking '+b.ref+' — '+b.name+'.';msg.classList.add('ok');
    render();
  }catch(_){msg.textContent='That code doesn\'t look valid. Copy the whole booking_code from the email.';msg.classList.add('err');}
});
</script>
</body>
</html>
